<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>WhaScale CRM</title>
  <style>
    body { width: 300px; font-family: Arial, sans-serif; padding: 16px; background: #111b21; color: #e9edef; margin: 0; }
    h2 { color: #10B981; margin: 0 0 12px; font-size: 16px; }
    p { font-size: 12px; color: #8696a0; margin: 0 0 10px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #2a3942; background: #1f2c34; color: #e9edef; font-size: 13px; margin-bottom: 8px; }
    button { width: 100%; padding: 9px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-bottom: 6px; }
    .btn-primary { background: #10B981; color: white; }
    .btn-secondary { background: #2a3942; color: #e9edef; }
    .status { font-size: 12px; padding: 6px 8px; border-radius: 4px; display: none; text-align: center; }
    .status.success { background: #064e3b; color: #6ee7b7; }
    .status.error { background: #7f1d1d; color: #fca5a5; }
    hr { border-color: #2a3942; margin: 12px 0; }
  </style>
</head>
<body>
  <h2>WhaScale CRM</h2>
  <p>Configure sua API Key para ativar o painel CRM no WhatsApp Web.</p>
  <label style="font-size:12px;color:#8696a0;">API Key do WhaScale</label>
  <input type="password" id="api-key-input" placeholder="Cole sua API Key aqui..."/>
  <button class="btn-primary" id="btn-save-key">Salvar API Key</button>
  <div id="status-msg" class="status"></div>
  <hr/>
  <button class="btn-secondary" id="btn-open-wa">Abrir WhatsApp Web</button>
  <script src="popup.js"></script>
</body>
</html>
